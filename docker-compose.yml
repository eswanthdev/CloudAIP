version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: cloudaip-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cloudaip-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cloudaip-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/cloudaip
      - NODE_ENV=production
      - PORT=5000
    networks:
      - cloudaip-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cloudaip-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - NEXT_PUBLIC_API_URL=http://server:5000/api
    networks:
      - cloudaip-network

volumes:
  mongodb_data:
    driver: local

networks:
  cloudaip-network:
    driver: bridge
