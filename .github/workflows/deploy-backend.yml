name: Deploy Backend

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  SAM_CLI_TELEMETRY: 0

jobs:
  deploy:
    name: Deploy Backend (${{ github.ref_name == 'main' && 'prod' || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_OUTPUT
            echo "STACK_NAME=cloudaip-prod" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
            echo "STACK_NAME=cloudaip-staging" >> $GITHUB_OUTPUT
          fi

      - name: SAM Build
        working-directory: backend
        run: sam build

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name ${{ steps.env.outputs.STACK_NAME }} \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.ENV_NAME }} \
              JwtSecret=${{ secrets.JWT_SECRET }} \
              JwtRefreshSecret=${{ secrets.JWT_REFRESH_SECRET }} \
              SESFromEmail=${{ vars.SES_FROM_EMAIL || 'hello@cloudaip.com' }} \
              AdminEmail=${{ vars.ADMIN_EMAIL || 'admin@cloudaip.com' }} \
              StripeSecretKey=${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }} \
              StripeWebhookSecret=${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }} \
              ClientUrl=${{ vars.CLIENT_URL || 'https://cloudaip.com' }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3

      - name: Output stack info
        run: |
          echo "### Backend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Stack:** ${{ steps.env.outputs.STACK_NAME }}" >> $GITHUB_STEP_SUMMARY
          aws cloudformation describe-stacks \
            --stack-name ${{ steps.env.outputs.STACK_NAME }} \
            --query 'Stacks[0].Outputs' \
            --output table >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
