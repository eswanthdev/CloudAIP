name: Deploy Frontend

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'pages/**'
      - 'assets/**'
      - 'Logo/**'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

jobs:
  deploy:
    name: Deploy Frontend (${{ github.ref_name == 'main' && 'prod' || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_OUTPUT
            echo "STACK_NAME=cloudaip-prod" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
            echo "STACK_NAME=cloudaip-staging" >> $GITHUB_OUTPUT
          fi

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ steps.env.outputs.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ steps.env.outputs.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          echo "BUCKET=$BUCKET" >> $GITHUB_OUTPUT
          echo "CF_DISTRIBUTION_ID=$CF_ID" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: |
          aws s3 sync . s3://${{ steps.stack.outputs.BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "backend/*" \
            --exclude "node_modules/*" \
            --exclude "package*.json" \
            --exclude "generate-infra-doc.js" \
            --exclude ".gitignore" \
            --exclude ".claude/*" \
            --exclude "*.docx" \
            --exclude "*.svg" \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

      - name: Set cache headers for HTML files
        run: |
          aws s3 cp s3://${{ steps.stack.outputs.BUCKET }} s3://${{ steps.stack.outputs.BUCKET }} \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=300, must-revalidate" \
            --content-type "text/html" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Output deployment info
        run: |
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ steps.env.outputs.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontUrl`].OutputValue' \
            --output text)
          echo "### Frontend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ steps.stack.outputs.BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront URL:** $CF_URL" >> $GITHUB_STEP_SUMMARY
