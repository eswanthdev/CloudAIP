name: Deploy Infrastructure (First-time Setup)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  SAM_CLI_TELEMETRY: 0

jobs:
  deploy:
    name: Deploy Infra (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        working-directory: backend
        run: sam build

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name cloudaip-${{ inputs.environment }} \
            --parameter-overrides \
              Environment=${{ inputs.environment }} \
              JwtSecret=${{ secrets.JWT_SECRET }} \
              JwtRefreshSecret=${{ secrets.JWT_REFRESH_SECRET }} \
              SESFromEmail=${{ vars.SES_FROM_EMAIL || 'hello@cloudaip.com' }} \
              AdminEmail=${{ vars.ADMIN_EMAIL || 'admin@cloudaip.com' }} \
              StripeSecretKey=${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }} \
              StripeWebhookSecret=${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }} \
              ClientUrl=${{ vars.CLIENT_URL || 'https://cloudaip.com' }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3

      - name: Output stack info
        run: |
          echo "### Infrastructure Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          aws cloudformation describe-stacks \
            --stack-name cloudaip-${{ inputs.environment }} \
            --query 'Stacks[0].Outputs' \
            --output table >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
